# gitleaks config — used by .github/workflows/secret-scan.yml.
#
# Patterns mirror .githooks/pre-commit so a leak that the local hook
# would have caught will also fail the CI scan. Update both together.

# Inherit gitleaks' built-in baseline (covers AWS, GCP, Stripe, Slack,
# generic high-entropy strings, etc.) so we only need to add the
# project-specific extras here.
[extend]
useDefault = true

# --- Project-specific rules ---

[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token (digits:base64chars format)"
regex = '''(?i)\b[0-9]{8,12}:[A-Za-z0-9_-]{30,}\b'''
keywords = ["telegram", "bot_token", "TELEGRAM_TOKEN", "TELEGRAM_BOT_TOKEN"]

[[rules]]
id = "hyperliquid-private-key"
description = "Ethereum/HyperLiquid private key (0x + 64 hex)"
regex = '''\b0x[a-fA-F0-9]{64}\b'''

[[rules]]
id = "cloudflare-api-token"
description = "Cloudflare API token assigned to CF_TOKEN/CLOUDFLARE_API_TOKEN"
regex = '''(?i)(CF|CLOUDFLARE)_(API_)?TOKEN[ =:]+["']?[A-Za-z0-9_-]{30,}'''

[[rules]]
id = "hardcoded-secret-assignment"
description = "Hardcoded SECRET_KEY/API_KEY/PASSWORD/PRIVATE_KEY literal"
# Matches: KEY = "value", KEY: "value" (YAML), KEY=value (dotenv).
# `[:=]` covers both Python-style and YAML/compose syntax; quotes
# optional so unquoted dotenv lines (`API_KEY=actualvalue`) also fire.
regex = '''(SECRET_KEY|API_KEY|PASSWORD|PRIVATE_KEY)[ ]*[:=][ ]*["']?[A-Za-z0-9_+/=-]{16,}["']?'''

# --- Identity / infra leaks (added 2026-05-11 after security audit) ---
# Mirrors the soft-warns from .githooks/pre-commit. CI fails on these
# even though local hook is warn-only — the public-repo cost-benefit
# favors hard-fail in CI (audit found 8+ leaks across config + docs
# that nobody noticed at commit time).

[[rules]]
id = "operator-domain"
description = "Operator-owned personal/company domain in committed code"
# `\b` boundary at the start of `xuper` excludes false positives
# like `xupxuper.fun` (no word-boundary between consecutive word
# chars) while still catching legit subdomains like
# `myhost.xuper.fun` (`.` is non-word, so `.x` is a boundary). Go
# regexp supports \b — same semantics as the local hook's PCRE.
regex = '''(?i)\b(xuper\.fun|molnkontakt\.se)\b'''

[[rules]]
id = "operator-service-subdomain"
description = "Operator-specific service subdomain (auth/phase/secrets/console/admin/api)"
regex = '''(?i)\b(auth|phase|secrets|console|admin|api)\.[a-z0-9-]+\.(fun|com|net|org|io|dev|se|app)\b'''

[[rules]]
id = "absolute-home-path"
description = "Absolute /home/<user>/ path reveals operator OS username"
regex = '''\b/home/[a-z][a-z0-9_-]{1,30}/'''

# --- Allowlist (false positives) ---

[allowlist]
description = "Paths and patterns that should never trigger"
paths = [
  '''(.*?)\.lock$''',
  '''(.*?)-lock\.json$''',
  '''node_modules/''',
  '''\.venv/''',
  '''bot/data/historical/''',
  '''\.gitleaks\.toml$''',  # this file contains the patterns themselves
  '''\.githooks/pre-commit$''',  # ditto
  '''CLAUDE\.md$''',  # documents the patterns + uses example tokens like "8639592584:AAGj…"
]

# Example/placeholder values used in docs and .env.example
regexes = [
  '''1234567890:your-actual-token-here''',
  '''you@example\.com''',
  '''0x[a-fA-F0-9]{64}.*example''',
  '''\$DEPLOY_HOST''',
  '''\$YOUR_DOMAIN''',
  # RFC 2606 reserved-for-documentation TLDs. CLAUDE.md is
  # already path-allowlisted above (it documents the rule), but
  # other docs (CLOUDFLARE_TUNNEL.md, INVITE_ONBOARDING.md, plan
  # docs) legitimately use `auth.example.com` /
  # `secrets.example.com` as placeholders — these regexes prevent
  # the new operator-service-subdomain rule from firing on them.
  '''(?i)\b(auth|phase|secrets|console|admin|api)\.example\.(com|org|net)\b''',
  '''(?i)\b(auth|phase|secrets|console|admin|api)\.(example|invalid|localhost|test)\b''',
  # `your-actual-domain.com`, `<your-domain>` style placeholders.
  '''(?i)\b(auth|phase|secrets|console|admin|api)\.(your|my|the)-?[a-z0-9-]*-?domain\.[a-z]{2,4}\b''',
  # Self-describing test-fixture strings (per-bot API_KEY tests, PR #119).
  # Fail-safe shape: any literal containing "should-be-ignored" or
  # "stale-system-value" or matching the gitleaks-fixture-marker pattern
  # is by construction not a real secret — no real key would ever
  # contain those substrings.
  '''should-be-ignored-by-systemEnv''',
  '''stale-system-value''',
]
# Allowlist git commits whose findings are known false positives but
# can't be removed without history rewrite. PR #119 (per-bot API_KEY)
# introduced two test fixture strings that match the
# hardcoded-secret-assignment rule; later commits on the branch
# replaced them, but gitleaks scans full history so the originals
# still trigger. Force-pushing the branch would require coordination
# with reviewers; safer to allowlist by SHA.
commits = [
  "e2c669a4707c5acebe462e692bbc8782bec49d06",
  "b9c1e859f866db1f62928be13ec2106b6f4747da",
  "6494efcc9b509c0fe0d878e16f1a334fbad4952d",
]
