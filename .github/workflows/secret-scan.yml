name: secret-scan

# Server-side belt-and-suspenders for secret leak prevention.
#
# Layer 1: .githooks/pre-commit blocks at commit time. Bypassable
#          (--no-verify) and only effective per-clone (core.hooksPath
#          is not auto-set by checkout).
# Layer 2: GitHub native push protection blocks pushes containing
#          known patterns (Telegram tokens, AWS keys, etc.) before
#          they hit the remote. Catches what Layer 1 missed; can't be
#          bypassed without explicit allow.
# Layer 3 (this workflow): gitleaks scan on every PR + push to master.
#          Catches custom patterns GitHub doesn't know about
#          (HyperLiquid keys, internal API_KEY assignments) and
#          surfaces a visible PR check that can't be skipped silently.

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned for supply-chain hardening: v5 / v2 tags can be
      # retargeted by the upstream maintainer (or an attacker who
      # compromises their account) to point at malicious code without
      # any version bump on our side. Pin the commit; bump deliberately.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # Full history so gitleaks scans the entire diff range,
          # not just HEAD. Catches secrets reintroduced via rebase.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use repo-local config so we share patterns with the
          # local pre-commit hook intent.
          GITLEAKS_CONFIG: .gitleaks.toml
