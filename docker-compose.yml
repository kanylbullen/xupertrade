x-bot-base: &bot-base
  build: ./bot
  # Explicit image tag so all three compose-defined bot services share
  # one built image instead of getting three identical per-service
  # images (`hypertrade-bot-paper`, `-testnet`, `-mainnet`). The
  # dashboard's bot-orchestrator (PR 2) launches per-tenant bots from
  # this same `hypertrade-bot:latest` tag — overridable via
  # HYPERTRADE_BOT_IMAGE on the dashboard service. Without this line,
  # `docker compose build` produces per-service images and orchestrator
  # bot-spawn fails with `no such image: hypertrade-bot:latest`.
  image: hypertrade-bot:latest
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:${API_PORT:-8000}/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
  volumes:
    # Local extracted Roots data for HODL signals. Read-only — files are
    # written by scripts/import_roots_har.py on the host (or rsync'd from
    # a workstation) and never modified by the container. Gitignored on
    # both sides — this is paid/personal data.
    - ./bot/data/private:/app/data/private:ro

x-bot-env: &bot-env
  PAPER_INITIAL_BALANCE: "10000"
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hypertrade
  REDIS_URL: redis://redis:6379/0
  POLL_INTERVAL_SECONDS: "60"
  MAX_POSITION_SIZE_USD: "200"
  MAX_DAILY_LOSS_USD: "100"
  KILL_SWITCH: "false"
  API_KEY: "${API_KEY:-}"
  DASHBOARD_URL: "${DASHBOARD_URL:-http://localhost:3000}"
  # Operator's tenant UUID (set by Phase 6b backfill). Required so the
  # bot's Repository tags every INSERT with a non-NULL tenant_id —
  # alembic 0011 flips the tenant_id column to NOT NULL, and without
  # this env the operator's existing 3 bots would crash on the first
  # write after the migration. Per-tenant bots (Phase 3a, started by
  # the dashboard orchestrator) get their own TENANT_ID injected at
  # container-create time.
  TENANT_ID: "${TENANT_ID:-00000000-0000-0000-0000-000000000001}"

  # Env-first override of dashboard auth + TLS config (Phase 6c
  # followup PR #67). When these are set in Phase, the bot's
  # `/api/auth/config`, `/api/auth/oidc-secret`, and `/api/tls/*`
  # endpoints return the env values instead of Redis. Empty (default)
  # = fall back to Redis for back-compat with deploys that still have
  # UI-written values there.
  #
  # IMPORTANT: these MUST be in `x-bot-env` (not just on the dashboard
  # service) because the BOT is what reads them — the dashboard proxies
  # the auth/tls config endpoints to the bot. Without these here, the
  # env-first override silently falls back to Redis.
  AUTH_MODE: "${AUTH_MODE:-}"
  OIDC_ISSUER: "${OIDC_ISSUER:-}"
  OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
  OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
  OIDC_SCOPES: "${OIDC_SCOPES:-}"
  TLS_ENABLED_ENV: "${TLS_ENABLED_ENV:-}"
  TLS_DOMAIN: "${TLS_DOMAIN:-}"
  TLS_EMAIL: "${TLS_EMAIL:-}"
  TLS_CF_API_TOKEN: "${TLS_CF_API_TOKEN:-}"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hypertrade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # change before internet-facing deployment
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hypertrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot-paper:
    <<: *bot-base
    container_name: hypertrade-bot-paper
    ports:
      - "8000:8000"
    environment:
      <<: *bot-env
      EXCHANGE_MODE: paper
      API_PORT: "8000"
      TELEGRAM_ENABLED: "false"

  bot-testnet:
    <<: *bot-base
    container_name: hypertrade-bot-testnet
    ports:
      - "8001:8001"
    environment:
      <<: *bot-env
      EXCHANGE_MODE: testnet
      API_PORT: "8001"
      HYPERLIQUID_PRIVATE_KEY: "${HYPERLIQUID_PRIVATE_KEY:-}"
      HYPERLIQUID_ACCOUNT_ADDRESS: "${HYPERLIQUID_ACCOUNT_ADDRESS:-}"
      # Telegram lives on the testnet bot — it subscribes to all 3 modes'
      # event channels and routes commands per-mode internally.
      TELEGRAM_ENABLED: "${TELEGRAM_ENABLED:-true}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      TELEGRAM_EVENTS: "${TELEGRAM_EVENTS:-trade.executed,position.closed,error,vault.qualified,vault.disqualified}"
      VAULT_TRACKING_ADDRESS: "${VAULT_TRACKING_ADDRESS:-}"

  bot-mainnet:
    <<: *bot-base
    container_name: hypertrade-bot-mainnet
    profiles: [mainnet]   # only starts when --profile mainnet is given
    ports:
      - "8002:8002"
    environment:
      <<: *bot-env
      EXCHANGE_MODE: mainnet
      API_PORT: "8002"
      HYPERLIQUID_PRIVATE_KEY: "${HYPERLIQUID_MAINNET_PRIVATE_KEY:-}"
      HYPERLIQUID_ACCOUNT_ADDRESS: "${HYPERLIQUID_MAINNET_ACCOUNT_ADDRESS:-}"
      TELEGRAM_ENABLED: "false"
      # Audit C3 allowlist. EMPTY = no strategies trade on mainnet (the bot
      # boots and serves API but won't open any new positions). Set in
      # the secrets manager (Phase) to a comma-separated list to enable
      # specific strategies, e.g. `MAINNET_ENABLED_STRATEGIES=bb_short`.
      # No default — fail-closed by design.
      MAINNET_ENABLED_STRATEGIES: "${MAINNET_ENABLED_STRATEGIES:-}"
      # First-week tiny rollout per audit recommendation. Hardcoded
      # rather than env-overridden so the operator can't accidentally
      # pick up the *bot-env defaults ($200 max position / $100 daily
      # loss — see x-bot-env above) on the first mainnet deploy. Bump
      # these via PR after first successful trades.
      MAX_POSITION_SIZE_USD: "20"
      MAX_DAILY_LOSS_USD: "20"

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      # Force Next.js standalone to bind 0.0.0.0. Setting HOSTNAME via
      # the Dockerfile ENV doesn't work because docker auto-injects
      # HOSTNAME=<container-id> at runtime, shadowing the image-level
      # value. Compose `environment:` overrides the docker default,
      # so it actually reaches the node process. Without this, Next.js
      # binds only to the container's docker-network address and the
      # in-container healthcheck (`wget localhost:3000/...`) fails with
      # "connection refused".
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hypertrade
      REDIS_URL: redis://redis:6379/0
      BOT_API_URL_PAPER: http://bot-paper:8000
      BOT_API_URL_TESTNET: http://bot-testnet:8001
      BOT_API_URL_MAINNET: http://bot-mainnet:8002
      DASHBOARD_URL: "${DASHBOARD_URL:-http://localhost:3000}"
      # Used as base for OIDC redirect_uri. If unset, falls back to
      # DASHBOARD_URL, then to the request's origin (which inside Docker
      # resolves to the container hostname — breaks OIDC).
      PUBLIC_URL: "${PUBLIC_URL:-${DASHBOARD_URL:-http://localhost:3000}}"
      API_KEY: "${API_KEY:-}"
      # Multi-tenancy Phase 3a: dashboard creates per-tenant bot
      # containers via the host docker daemon. The shared network
      # name lets bots reach postgres + redis on the internal docker
      # network without exposing extra ports.
      HYPERTRADE_DOCKER_NETWORK: "${HYPERTRADE_DOCKER_NETWORK:-hypertrade_default}"
      HYPERTRADE_BOT_IMAGE: "${HYPERTRADE_BOT_IMAGE:-hypertrade-bot:latest}"
    volumes:
      # Multi-tenancy Phase 3a: dashboard binds the host's docker
      # socket so it can create/start/stop per-tenant bot containers
      # via dockerode. Same blast-radius as the operator already has
      # on the host (docker socket = root-equivalent), so no new
      # privilege boundary. Read-only would be ideal but dockerode
      # needs write for create/start/stop.
      - /var/run/docker.sock:/var/run/docker.sock
    # Add a supplementary group whose gid matches the host's
    # docker.sock owner (typically gid=105 on Debian/Ubuntu, 999 on
    # some others — check `stat -c '%g' /var/run/docker.sock`). The
    # dashboard runs as the unprivileged `nextjs` user (see
    # dashboard/Dockerfile), which lacks any group with access to
    # the docker socket — without this, bot-spawn calls fail with
    # `EACCES /var/run/docker.sock`. Override via DOCKER_GID env if
    # your host uses a different gid.
    group_add:
      - "${DOCKER_GID:-105}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Probe a dedicated liveness endpoint that has zero downstream
      # dependencies (no DB, no bot, no Redis) — just confirms the
      # Next.js process is serving requests. `/api/auth/config` was a
      # bad choice: it 503s when the bot is unreachable, cascading
      # bot outages into dashboard "unhealthy" even though the dashboard
      # itself is fine.
      #
      # wget (not curl) because node:22-alpine ships busybox wget but
      # not curl. busybox `wget --spider` returns 0 on 2xx and non-zero
      # on connection failure / 4xx-5xx — exactly what we want.
      #
      # 127.0.0.1 (not localhost): busybox wget tries IPv6 (`[::1]`)
      # first when given `localhost` and does NOT fall back to IPv4 on
      # connection-refused. Next.js standalone binds IPv4-only (no
      # tcp6 socket), so the IPv6 attempt fails and wget gives up.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    build: ./caddy
    container_name: hypertrade-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      # Default host the bootstrap Caddyfile issues a self-signed cert
      # for. Set in .env to match your dashboard hostname so browsers
      # don't get a name-mismatch warning on top of the self-signed one.
      CADDY_HOST: "${CADDY_HOST:-localhost}"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_started

  # Cloudflare Tunnel: terminates public TLS at CF edge, forwards
  # the operator's configured public hostname to dashboard:3000 over
  # the internal docker network. No inbound ports — cloudflared
  # connects OUT to CF and accepts forwarded requests over that
  # tunnel.
  #
  # Caddy is intentionally kept for LAN access (operator on the
  # internal network reaches the dashboard via Caddy + Let's Encrypt).
  # Public users come through this tunnel and never touch Caddy or
  # the host's :443.
  #
  # CF DDoS-protection + bot-management apply to public traffic
  # automatically. Cloudflare Access (extra auth gate on top of
  # Authentik) is NOT enabled by default — opt in via the CF Zero
  # Trust UI if needed (see docs/CLOUDFLARE_TUNNEL.md).
  #
  # Profile-gated to opt-in: deploy with `--profile public` or
  # add `public` to COMPOSE_PROFILES so LAN-only deploys don't
  # need a CF account.
  cloudflared:
    # Pinned to a specific tag (NOT :latest) so deploys are
    # reproducible. cloudflared releases are frequent — bump this
    # tag intentionally after reading the changelog rather than
    # taking whatever happens to be on Docker Hub today.
    image: cloudflare/cloudflared:2026.3.0
    container_name: hypertrade-cloudflared
    profiles: [public]
    restart: unless-stopped
    # exec-form (YAML list) + `${VAR:?msg}` so a missing token
    # fails fast at compose-up time with a clear error instead of
    # crash-looping inside the container with an empty `--token`.
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required for the public profile (set in Phase, injected via `phase run`)}
    depends_on:
      dashboard:
        condition: service_started
    # cloudflared connects OUTBOUND to CF; no ports exposed.
    # Joining the default network gives it routing to dashboard:3000
    # via docker DNS.

volumes:
  pgdata:
  caddy_data:
  caddy_config:
